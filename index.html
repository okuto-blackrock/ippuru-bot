<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大泉第一小学校 80周年 いっぷるインタビューボット</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--cream:#fdf6e3;--brown:#6b3d1e;--gold:#c8963e;--lgold:#f0c96a}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--cream);min-height:100vh;display:flex;flex-direction:column;align-items:center;background-image:radial-gradient(circle at 20% 20%,rgba(122,173,106,.08) 0%,transparent 50%),radial-gradient(circle at 80% 80%,rgba(200,150,62,.08) 0%,transparent 50%)}
header{width:100%;max-width:760px;text-align:center;padding:16px 16px 4px}
header h1{font-size:1.1rem;color:var(--brown);font-weight:700}
header p{font-size:.78rem;color:var(--gold);margin:2px 0 10px}
.bubble-container{position:relative;margin:10px auto 15px;min-height:60px;width:100%;max-width:320px}
.bubble{position:relative;background:#fff;border:2.5px solid var(--lgold);border-radius:20px;padding:12px 18px;font-size:.9rem;color:var(--brown);text-align:center;box-shadow:0 4px 10px rgba(107,61,30,.1);min-width:180px;z-index:2}
.bubble::after{content:'';position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);border-top:12px solid var(--lgold);border-left:10px solid transparent;border-right:10px solid transparent}
.char-container{position:relative;width:140px;height:140px;margin-bottom:10px}
.char-img{width:100%;height:100%;object-fit:contain;transition:transform .3s ease}
.thinking .char-img{animation:shake .5s infinite alternate}
@keyframes shake{from{transform:translateY(0)}to{transform:translateY(-5px)}}
.suggest-container{width:100%;max-width:760px;display:flex;flex-wrap:wrap;justify-content:center;gap:8px;padding:0 10px;margin-bottom:15px}
.suggest-btn{background:#fff;border:1.5px solid var(--lgold);border-radius:15px;padding:6px 12px;font-size:.75rem;color:var(--brown);cursor:pointer;transition:all .2s;white-space:nowrap}
.suggest-btn:hover{background:var(--lgold);color:#fff}
.chat-container{width:100%;max-width:540px;background:rgba(255,255,255,.6);border-radius:24px;border:2px solid #f0e6cc;margin:0 10px 100px;display:flex;flex-direction:column;height:400px;overflow:hidden;box-shadow:inset 0 2px 10px rgba(0,0,0,.02)}
#chatLog{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;scrollbar-width:thin}
.msg{max-width:85%;padding:10px 16px;border-radius:18px;font-size:.88rem;line-height:1.5;position:relative;animation:fadeIn .3s ease forwards}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.user{align-self:flex-end;background:var(--lgold);color:#fff;border-bottom-right-radius:4px}
.msg.user::before{content:'先生';position:absolute;top:-16px;right:4px;font-size:.65rem;color:var(--gold)}
.msg.bot{align-self:flex-start;background:#fff;color:var(--brown);border:1.5px solid #eee;border-bottom-left-radius:4px}
.msg.bot::before{content:'いっぷる';position:absolute;top:-16px;left:4px;font-size:.65rem;color:var(--gold)}
.input-area{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:95%;max-width:540px;display:flex;gap:8px;background:#fff;padding:8px;border-radius:30px;box-shadow:0 10px 25px rgba(107,61,30,.15);border:2px solid var(--lgold);z-index:100}
input{flex:1;border:none;padding:10px 20px;font-size:.9rem;outline:none;background:transparent;font-family:inherit}
button#sendBtn{background:var(--gold);border:none;width:44px;height:44px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .2s}
button#sendBtn:hover{background:var(--brown)}
button#sendBtn svg{fill:#fff;width:20px;height:20px}
.demo-badge{width:100%;max-width:540px;margin:10px auto;background:#fdf0d5;border:1px dashed var(--gold);padding:8px;border-radius:12px;font-size:.7rem;color:var(--brown);text-align:center}
footer{padding:20px;color:var(--gold);font-size:.65rem;text-align:center}
</style>
</head>
<body>

<header>
  <h1>🍁 大泉第一小学校 80周年記念</h1>
  <p>いっぷるに聞いてみよう！</p>
</header>

<div class="bubble-container">
  <div class="bubble" id="bubble">こんにちはっぷる！</div>
</div>

<div class="char-container" id="charBox">
  <img src="https://okuto-blackrock.github.io/ippuru-bot/ippuru_standard.png" class="char-img" id="charImg" alt="いっぷる">
</div>

<div class="suggest-container" id="suggests">
  <button class="suggest-btn" onclick="ask(this)">📅 学校はいつできたの？</button>
  <button class="suggest-btn" onclick="ask(this)">🏫 昔の学校の様子は？</button>
  <button class="suggest-btn" onclick="ask(this)">🌳 大泉という地名の由来は？</button>
  <button class="suggest-btn" onclick="ask(this)">🎉 80周年って何がすごいの？</button>
  <button class="suggest-btn" onclick="ask(this)">🐝 昔の子どもたちの勉強は？</button>
</div>

<div class="chat-container">
  <div id="chatLog"></div>
</div>

<div class="input-area">
  <input type="text" id="inp" placeholder="質問を入力してね..." onkeypress="if(event.key==='Enter')sendMsg()">
  <button id="sendBtn" onclick="sendMsg()">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
// ==========================================
// ⚠️ 設定項目
// ==========================================

// 1. ここにAPIキーを貼り付けてください
const GEMINI_API_KEY = "AIzaSyAYMJmSSqmRyh9hlV1Ztq0uiC3jK8AoA44"; 

// 2. モデル名（安定版の gemini-1.5-flash を使用します）
const GEMINI_MODEL = "gemini-1.5-flash";

// 3. キャラクター設定
const SP = "あなたは東京都練馬区にある『大泉第一小学校』の開校80周年公式キャラクター『いっぷる』です。語尾に『〜っぷる！』をつけて、小学生にもわかりやすく、親しみやすく答えてください。学校の歴史や練馬の自然が大好きです。";

// ==========================================

const chatLog = document.getElementById('chatLog');
const inp = document.getElementById('inp');
const sendBtn = document.getElementById('sendBtn');
const bubble = document.getElementById('bubble');
const charImg = document.getElementById('charImg');
const charBox = document.getElementById('charBox');

let loading = false;

function addMsg(role, text){
  const d = document.createElement('div');
  d.className = 'msg ' + role;
  d.innerText = text;
  chatLog.appendChild(d);
  chatLog.scrollTop = chatLog.scrollHeight;
}

function setState(s){
  charBox.className = 'char-container ' + (s||'');
  if(s === 'thinking') charImg.src = "https://okuto-blackrock.github.io/ippuru-bot/ippuru_thinking.png";
  else if(s === 'talking') charImg.src = "https://okuto-blackrock.github.io/ippuru-bot/ippuru_talking.png";
  else if(s === 'happy') charImg.src = "https://okuto-blackrock.github.io/ippuru-bot/ippuru_happy.png";
  else charImg.src = "https://okuto-blackrock.github.io/ippuru-bot/ippuru_standard.png";
}

function setBubble(t, isThinking){
  bubble.innerText = isThinking ? "考え中っぷる..." : t;
}

function ask(b){
  inp.value = b.textContent.replace(/^.\s/,'');
  sendMsg();
}

async function sendMsg(){
  const t = inp.value.trim();
  if(!t || loading) return;
  if(!GEMINI_API_KEY) {
    addMsg('bot', 'APIキーが設定されていないっぷる！コードの最初の方にある GEMINI_API_KEY にキーを入れてね。');
    return;
  }
  
  loading = true;
  sendBtn.disabled = true;
  inp.value = '';
  
  addMsg('user', t);
  setState('thinking');
  setBubble('', true);
  
  try {
    const responseText = await callAPI(t);
    setState('talking');
    addMsg('bot', responseText);
    setBubble(responseText.length > 40 ? responseText.slice(0,40) + '…' : responseText);
    
    setTimeout(() => {
      setState('happy');
      setTimeout(() => setState(null), 2100);
    }, 400);
  } catch(e) {
    console.error(e);
    addMsg('bot', 'ごめんね、うまく繋がらなかったっぷる。APIキーやモデル設定を確認してね。');
    setBubble('エラーが起きたっぷる…');
    setState(null);
  } finally {
    loading = false;
    sendBtn.disabled = false;
    inp.focus();
  }
}

async function callAPI(t){
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent?key=${GEMINI_API_KEY}`;
  
  const r = await fetch(url, {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      system_instruction: { parts: [{ text: SP }] },
      contents: [{ parts: [{ text: t }] }]
    })
  });
  
  const d = await r.json();
  if (!r.ok) throw new Error(d.error?.message || 'API Error');
  return d.candidates?.[0]?.content?.parts?.[0]?.text || "うーん、難しいっぷる...";
}
</script>

</body>
</html>
